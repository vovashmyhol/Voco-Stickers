<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voco Sticker Shop</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
    <div id="app">
        <!-- Background Layer -->
        <div class="main-background"></div>

        <!-- Scroll-triggered Blur Overlay -->
        <div id="scrollOverlay" class="scroll-overlay"></div>

        <!-- Scrolling Headroom Spacer -->
        <div class="scroll-headroom"></div>

        <!-- Header Content -->
        <header class="main-header">
            <div class="avatar-container">
                <img src="voco_logo.jpg" alt="Voco Logo" class="profile-avatar">
            </div>
            <div class="brand-info">
                <div class="brand-name">
                    <h1>VOCO</h1>
                    <img src="verify.WEBP" alt="Verified" class="verify-badge">
                </div>
                <a href="https://t.me/voco_in" class="channel-link" target="_blank">by <span>@voco_in</span></a>
            </div>
        </header>

        <!-- Collections Section -->
        <section class="collections-section">
            <h2 class="section-title">Collections</h2>
            <div class="collections-carousel" id="collectionsCarousel">
                <div class="pack-card" id="vocoPack">
                    <img src="пак.jpg" alt="Voco Pack" class="pack-image">
                </div>
                <!-- Future packs can be added here -->
            </div>
        </section>

        <div class="carousel-dots">
            <span class="dot active"></span>
        </div>

        <!-- Profile Navigation (Bottom Right) -->
        <div class="profile-nav-container">
            <button class="profile-button" id="profileBtn">
                <img id="userPhoto" src="voco_logo.jpg" alt="Profile" class="user-avatar">
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
