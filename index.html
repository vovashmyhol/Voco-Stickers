<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOCO Stickers</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Elastic Banner Section -->
        <div class="banner-container" id="banner-container">
            <img src="photo_2026-04-11_13-40-53.jpg" alt="VOCO Banner" id="elastic-banner">
            <div class="banner-overlay"></div>
        </div>

        <div class="content-wrapper">
            <!-- Profile Section -->
            <header class="profile-section">
                <div class="logo-wrapper">
                    <div class="logo-container">
                        <img src="voco_logo.jpg" alt="VOCO Logo" class="profile-logo">
                    </div>
                </div>
                
                <div class="profile-info">
                    <div class="title-row">
                        <h1 class="profile-name">VOCO</h1>
                        <img src="verify.WEBP" alt="Verified" class="verify-badge">
                    </div>
                    <a href="https://t.me/voco_in" class="channel-link" target="_blank">by @voco_in</a>
                </div>
            </header>

            <!-- Description -->
            <section class="description-section">
                <p>Эксклюзивные стикеры от VOCO. Коллекционируй, используй, выделяйся.</p>
            </section>

            <!-- Sticker Preview Carousel -->
            <section class="carousel-section">
                <div class="section-header">
                    <h2 class="section-title">Доступные стикеры</h2>
                </div>
                <div class="carousel-container" id="sticker-carousel">
                    <!-- Stickers will be added via JS or defined here -->
                    <div class="sticker-card placeholder">
                        <div class="sticker-placeholder-inner"></div>
                    </div>
                    <div class="sticker-card placeholder">
                        <div class="sticker-placeholder-inner"></div>
                    </div>
                    <div class="sticker-card placeholder">
                        <div class="sticker-placeholder-inner"></div>
                    </div>
                    <!-- "Show More" Trigger -->
                    <div class="view-more-card" id="view-more-btn">
                        <div class="view-more-inner">
                            <span class="view-more-icon">+</span>
                            <span>Еще</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Purchase Modal (Slide-up Sheet) -->
        <div class="modal-overlay" id="purchase-modal">
            <div class="modal-blue-glow"></div>
            <div class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <button class="close-btn" id="close-modal">✕</button>
                    <div class="modal-nav">
                        <span>Стикеры</span>
                        <div class="nav-dots">
                             <span class="dot active"></span>
                             <span class="dot"></span>
                             <span class="dot"></span>
                        </div>
                    </div>
                </div>
                
                <div class="modal-body">
                    <div class="selected-sticker-display">
                        <div class="sticker-placeholder-large"></div>
                        <h2 class="sticker-set-title">VOCO stickers</h2>
                    </div>

                    <div class="info-table">
                        <div class="info-row">
                            <span class="info-label">Owner</span>
                            <span class="info-value">Volodymyr</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Price</span>
                            <div class="info-value price-tag">
                                <span>15</span>
                                <img src="stars-DBKMczxe.png" alt="stars" class="star-icon">
                            </div>
                        </div>
                    </div>

                    <button class="buy-button">Open</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
