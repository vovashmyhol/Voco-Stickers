<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voco Sticker Shop</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-logo-wrap">
            <lottie-player src="https://raw.githubusercontent.com/vovashmyhol/Voco-Stickers/refs/heads/main/Splash.json" background="transparent" speed="1" loop autoplay></lottie-player>
        </div>
    </div>

    <div id="app">
        <!-- Background Layer -->
        <div class="main-background"></div>

        <!-- Scroll-triggered Blur Overlay -->
        <div id="scrollOverlay" class="scroll-overlay"></div>

        <!-- Scrolling Headroom Spacer -->
        <div class="scroll-headroom"></div>

        <!-- Header Content -->
        <header class="main-header">
            <div class="avatar-container">
                <img src="voco_logo.jpg" alt="Voco Logo" class="profile-avatar">
            </div>
            <div class="brand-info">
                <div class="brand-name">
                    <h1>VOCO</h1>
                    <img src="verify.WEBP" alt="Verified" class="verify-badge">
                </div>
                <a href="https://t.me/voco_in" class="channel-link" target="_blank">by <span>@voco_in</span></a>
            </div>
        </header>

        <!-- Collections Section -->
        <section class="collections-section">
            <h2 class="section-title">Collections</h2>
            <div class="collections-carousel" id="collectionsCarousel">
                <div class="pack-card" id="vocoPack">
                    <div class="pack-supply-tag">333/333</div>
                    <img src="пак.jpg" alt="Voco Pack" class="pack-image">
                </div>
                <!-- Future packs can be added here -->
            </div>
            <div class="carousel-dots">
                <span class="dot active"></span>
            </div>
        </section>

        <!-- Profile Navigation (Bottom Right) -->
        <div class="profile-nav-container">
            <button class="profile-button" id="profileBtn">
                <img id="userPhoto" src="voco_logo.jpg" alt="Profile" class="user-avatar">
            </button>
        </div>

        <!-- Profile View -->
        <div id="profileView" class="profile-page">
            <div class="profile-header-bg" id="profileHeaderBg"></div>
            <div class="profile-stars-bg" id="profileStarsBg"></div>
            <div class="profile-content">
                <div class="profile-main-info">
                    <div class="profile-avatar-container-large">
                        <img src="Corone.PNG" alt="Crown" class="user-crown">
                        <div class="profile-avatar-large">
                            <img id="userPhotoLarge" src="voco_logo.jpg" alt="User Avatar">
                        </div>
                    </div>
                    <h1 id="userName" class="user-name-title">User Name</h1>
                    <div class="user-stats">
                        <span class="stat-item"><span id="packCount">0</span> паков</span>
                        <div class="user-id-container" id="copyId">
                            <span id="userId" class="user-id-text">123456789</span>
                            <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="inventory-grid" id="inventoryGrid">
                    <!-- Stickers will be injected here -->
                </div>
            </div>
        </div>

        <!-- Detailed Pack Modal -->
        <div id="packModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-handle"></div>
                
                <div class="modal-top-nav">
                    <button class="modal-close-small" id="closeModal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <div class="modal-header-centered">
                        <div class="slider-dots-mini" id="modalDots">
                            <span class="m-dot active"></span>
                            <span class="m-dot"></span>
                            <span class="m-dot"></span>
                        </div>
                    </div>
                </div>

                <div class="modal-body">
                    <div class="pack-preview-area">
                        <div class="lottie-slider" id="lottieSlider">
                            <div class="lottie-slide">
                                <lottie-player src="https://raw.githubusercontent.com/vovashmyhol/Voco-Stickers/refs/heads/main/Artboard%201%20(3).json" background="transparent" speed="1" loop autoplay></lottie-player>
                            </div>
                            <div class="lottie-slide">
                                <lottie-player src="https://raw.githubusercontent.com/vovashmyhol/Voco-Stickers/refs/heads/main/Artboard%201%20(3).json" background="transparent" speed="1" loop autoplay></lottie-player>
                            </div>
                            <div class="lottie-slide">
                                <lottie-player src="https://raw.githubusercontent.com/vovashmyhol/Voco-Stickers/refs/heads/main/Artboard%201%20(3).json" background="transparent" speed="1" loop autoplay></lottie-player>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="pack-title-bold">The Pack</h2>
                    
                    <div class="info-card" id="marketInfo">
                        <div class="info-row">
                            <span class="info-label">Supply</span>
                            <span class="info-value" id="supplyValue">333 of 333</span>
                        </div>
                        <div class="info-divider"></div>
                        <div class="info-row">
                            <span class="info-label">Price</span>
                            <div class="info-value price-stars">
                                <span id="priceValue">15</span>
                                <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon-img">
                            </div>
                        </div>
                        <div id="ownerRow" style="display: none;">
                            <div class="info-divider"></div>
                            <div class="info-row">
                                <span class="info-label">Owner</span>
                                <span class="info-value" id="ownerName">User Name</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modal-actions">
                        <button class="premium-action-button" id="buyBtn">Get</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
